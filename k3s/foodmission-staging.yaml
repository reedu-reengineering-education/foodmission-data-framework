---
# 1. NAMESPACE
apiVersion: v1
kind: Namespace
metadata:
  name: foodmission
---
# 2. CLUSTER ISSUER (Global SSL settings)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: f.erdmann@reedu.de
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          class: nginx
---
# 3. KEYCLOAK DEPLOYMENT (App + DB in one for simplicity)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: foodmission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: ghcr.io/reedu-reengineering-education/foodmission-keycloak:main
        args: ["start"]
        env:
          - name: KC_DB
            value: "postgres"
          - name: KC_DB_URL
            value: "jdbc:postgresql://10.0.0.5:5432/keycloak"
          - name: KC_DB_USERNAME
            value: "keycloak_user"
          - name: KC_DB_PASSWORD
            value: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          - name: KEYCLOAK_ADMIN
            value: "admin"
          - name: KEYCLOAK_ADMIN_PASSWORD
            value: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          - name: KC_HOSTNAME
            value: "staging.auth.api.foodmission.eu"
          - name: KC_PROXY_HEADERS
            value: "xforwarded"
          - name: KC_HTTP_ENABLED
            value: "true"
          - name: KC_PROXY
            value: "edge"
        ports:
        - containerPort: 8080
---
# 4. SERVICE
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: foodmission
spec:
  selector:
    app: keycloak
  ports:
  - port: 80
    targetPort: 8080
---
# 6. NESTJS DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: foodmission
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: ghcr.io/reedu-reengineering-education/foodmission-data-framework:latest
        imagePullPolicy: Always
        volumeMounts:
        - name: log-storage
          mountPath: /app/logs
        ports:
        - containerPort: 3000
        env:
          - name: NODE_ENV
            value: "production"
          - name: DATABASE_URL
            value: "postgresql://foodmission_user:xxxxxxxxx@10.0.0.5:5432/foodmission"
          - name: SESSION_SECRET
            value: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          - name: ENCRYPTION_KEY
            value: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          - name: KEYCLOAK_BASE_URL
            value: "https://staging.auth.api.foodmission.eu"
          - name: KEYCLOAK_REALM
            value: "foodmission"
          - name: KEYCLOAK_CLIENT_ID
            value: "foodmission-api"
          - name: KEYCLOAK_CLIENT_SECRET
            value: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          - name: KEYCLOAK_REDIRECT_URI
            value: "https://staging.api.foodmission.eu/auth/callback"
          - name: KEYCLOAK_SERVICE_CLIENT_ID
            value: "foodmission-service"
          - name: KEYCLOAK_SERVICE_CLIENT_SECRET
            value: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          # Add other NestJS env vars here (DB_URL, etc.)
      volumes:
      - name: log-storage
        emptyDir: {} # Creates a fresh writable directory on the node
---
# 7. NESTJS SERVICE
apiVersion: v1
kind: Service
metadata:
  name: nestjs-service
  namespace: foodmission
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 3000
---
# 5. INGRESS (The SSL-enabled Door)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: foodmission
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # Must match metadata.name above
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  tls:
  - hosts:
    - staging.auth.api.foodmission.eu
    - staging.api.foodmission.eu
    secretName: foodmission-tls-cert # Renamed to cover both
  rules:
  - host: staging.auth.api.foodmission.eu
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: keycloak-service
            port:
              number: 80
  - host: staging.api.foodmission.eu
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nestjs-service
            port:
              number: 80