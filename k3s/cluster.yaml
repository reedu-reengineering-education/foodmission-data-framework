cluster_name: foodmission-k3s
protect_against_deletion: false
kubeconfig_path: "./kubeconfig"
k3s_version: v1.35.0+k3s1

networking:
  ssh:
    port: 22
    use_agent: false
    public_key_path: "~/.ssh/id_ed25519.pub"
    private_key_path: "~/.ssh/id_ed25519"
  allowed_networks:
    ssh:
      - 0.0.0.0/0
    api:
      - 0.0.0.0/0

addons:
  metrics_server:
    enabled: true

# The Control Plane
masters_pool:
  instance_type: cx23 # Smallest instance for master
  instance_count: 1
  location: fsn1

# The Worker Plane (Required by the tool)
worker_node_pools:
  - name: workers
    instance_type: cx33 # Slightly more RAM for Keycloak/Java
    instance_count: 2
    location: fsn1