apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0  # Don't retry migrations - fail fast if there's an issue
  template:
    spec:
      containers:
      - name: migrate
        image: {{ .Values.api.image }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        command: ["node", "node_modules/.bin/prisma", "migrate", "deploy"]
        envFrom:
          - secretRef:
              name: foodmission-api-secret
        # All environment variables are now loaded from the secret foodmission-api-secret
      restartPolicy: Never
