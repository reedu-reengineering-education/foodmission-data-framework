{{- if .Values.cnpg.enabled }}
# Unified app credentials secret with connection strings
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.cnpg.clusterName }}-app-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "Unified database credentials and connection strings for applications"
type: kubernetes.io/basic-auth
stringData:
  username: {{ required "global.cnpg.owner is required" .Values.global.cnpg.owner }}
  password: {{ required "global.cnpg.password is required" .Values.global.cnpg.password }}
  # Connection strings for convenience
  postgres-uri: "postgresql://{{ .Values.global.cnpg.owner }}:{{ .Values.global.cnpg.password }}@{{ .Values.global.cnpg.clusterName }}-rw.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.global.cnpg.database }}"
  keycloak-jdbc-uri: "jdbc:postgresql://{{ .Values.global.cnpg.clusterName }}-rw.{{ .Values.global.namespace }}.svc.cluster.local:5432/keycloak"
---
# CNPG bootstrap secret (referenced by cluster spec)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cnpg.secretName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: database-bootstrap
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "CNPG cluster bootstrap credentials"
type: kubernetes.io/basic-auth
stringData:
  username: {{ required "global.cnpg.owner is required" .Values.global.cnpg.owner }}
  password: {{ required "global.cnpg.password is required" .Values.global.cnpg.password }}
---
{{- if .Values.cnpg.backup.enabled }}
# S3 backup credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cnpg.backup.s3Secret }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: backup-credentials
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "S3 credentials for CNPG backup storage"
type: Opaque
stringData:
  ACCESS_KEY_ID: {{ required "cnpg.backup.s3AccessKeyId is required when backup is enabled" .Values.cnpg.backup.s3AccessKeyId }}
  ACCESS_SECRET_KEY: {{ required "cnpg.backup.s3SecretAccessKey is required when backup is enabled" .Values.cnpg.backup.s3SecretAccessKey }}
{{- end }}
{{- end }}
