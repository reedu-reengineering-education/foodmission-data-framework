# Tempo Helm values for k3s
# Install with: helm install tempo grafana/tempo -n observability -f tempo-values.yaml

deploymentMode: SingleBinary

tempo:
  reportingEnabled: false
  
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus-server.observability.svc.cluster.local:80/api/v1/write"
  
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
  
  retention: 168h  # 7 days
  
  global_overrides:
    max_bytes_per_trace: 5000000

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    # storageClass will use the default storage class if not specified
    # For k3s, this is typically 'local-path'
    # If you need to specify it explicitly, uncomment the line below:
    # storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Disable components not needed in single binary mode
distributor:
  replicas: 0
ingester:
  replicas: 0
compactor:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
metrics-generator:
  replicas: 0

# Service configuration
service:
  type: ClusterIP

# Gateway
gateway:
  enabled: false

# Monitoring
serviceMonitor:
  enabled: false

# Test
test:
  enabled: false
