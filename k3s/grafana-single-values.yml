  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          orgId: 1
          access: proxy
          url: http://prometheus-server.observability.svc.cluster.local:80
          isDefault: true
          jsonData:
            timeInterval: 30s
          
        - name: Loki
          type: loki
          uid: loki
          orgId: 1
          access: proxy
          url: http://loki.observability.svc.cluster.local:3100
          isDefault: false
          jsonData:
            maxLines: 1000
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: "trace_id=(\\w+)"
                name: TraceID
                url: "$${__value.raw}"
        
        - name: Tempo
          type: tempo
          uid: tempo
          orgId: 1
          access: proxy
          url: http://tempo.observability.svc.cluster.local:3200
          isDefault: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: '-1h'
              spanEndTimeShift: '1h'
              filterByTraceID: true
              filterBySpanID: false
              tags: ['job', 'instance', 'pod', 'namespace']
            tracesToMetrics:
              datasourceUid: prometheus
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            lokiSearch:
              datasourceUid: loki

  dashboardProviders:
   dashboardproviders.yaml:
     apiVersion: 1
     providers:
     - name: 'default'
       orgId: 1
       folder: ''
       type: file
       disableDeletion: true
       editable: true
       options:
         path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # k3s
      k3s:
        gnetId: 15282
        datasource: prometheus
      
      # Node Exporter Full - Detailed server metrics (CPU, memory, disk, network)
      node-exporter:
        gnetId: 1860
        datasource: prometheus

      # Kubernetes Pods - See what's running and resource usage
      kubernetes-pods:
        gnetId: 6417
        datasource: prometheus
      
      # Loki Logs Dashboard - Search and explore logs
      loki-logs:
        gnetId: 13639
        datasource: loki
      
      # Tempo Traces - Distributed tracing overview
      tempo-traces:
        gnetId: 16541
        datasource: tempo
