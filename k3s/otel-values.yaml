mode: deployment
image:
  repository: "otel/opentelemetry-collector-contrib"
presets:
  clusterMetrics:
    enabled: true
  # Disable automatic log collection from k8s to avoid duplicate plain-text logs
  logsCollection:
    enabled: false
config:
  processors:
    batch:
      timeout: 10s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
    resource:
      attributes:
        - key: service.namespace
          value: foodmission
          action: upsert
    # Add attributes processor to help identify log source
    attributes/logs:
      actions:
        - key: log.source
          value: "otlp"
          action: insert
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  exporters:
    # Debug exporter to see what's being received
    debug:
      verbosity: detailed
      sampling_initial: 5
      sampling_thereafter: 200
    # Loki for logs
    otlphttp/loki:
      endpoint: http://loki.observability.svc.cluster.local:3100/otlp
      tls:
        insecure: true
    # Tempo for traces
    otlp/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true
    # Prometheus for metrics
    prometheusremotewrite:
      endpoint: http://prometheus-server.observability.svc.cluster.local:80/api/v1/write
      tls:
        insecure: true
  service:
    pipelines:
      logs:
        receivers: [otlp]
        processors: [memory_limiter, attributes/logs, batch, resource]
        exporters: [debug, otlphttp/loki]
      # Metrics pipeline disabled until Prometheus is installed
      # metrics:
      #   receivers: [otlp]
      #   processors: [memory_limiter, batch, resource]
      #   exporters: [prometheusremotewrite]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [otlp/tempo]
