apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-keycloak-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak-credentials
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "Keycloak application secrets and database credentials"
stringData:
  # Database connection - uses keycloak.db.* if set, otherwise falls back to global.cnpg.*
  KC_DB_URL: "{{ .Values.keycloak.db.url | default (printf "jdbc:postgresql://%s-rw.%s.svc.cluster.local:5432/keycloak" .Values.global.cnpg.clusterName .Values.global.namespace) }}"
  KC_DB_USERNAME: "{{ .Values.keycloak.db.username | default .Values.global.cnpg.owner }}"
  KC_DB_PASSWORD: "{{ .Values.keycloak.db.password | default .Values.global.cnpg.password }}"
  KEYCLOAK_ADMIN_PASSWORD: "{{ required "keycloak.admin.password is required" .Values.keycloak.admin.password }}"
  # Add other Keycloak secrets here as needed
