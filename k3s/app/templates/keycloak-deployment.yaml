apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "Keycloak authentication service deployment"
spec:
  replicas: {{ .Values.keycloak.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
        app.kubernetes.io/part-of: foodmission
        environment: {{ .Values.global.environment }}
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: '/metrics'
        prometheus.io/port: '9000'
    spec:
      containers:
      - name: keycloak
        image: {{ .Values.keycloak.image }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        args: ["start", "--import-realm"]
        env:
          - name: KC_DB
            value: "postgres"
          - name: KEYCLOAK_ADMIN
            value: "{{ .Values.keycloak.admin.user }}"
          - name: KC_HOSTNAME
            value: "{{ .Values.keycloak.hostname }}"
          - name: KC_PROXY_HEADERS
            value: "xforwarded"
          - name: KC_HTTP_ENABLED
            value: "true"
          - name: KC_METRICS_ENABLED
            value: "true"
          - name: KC_HEALTH_ENABLED
            value: "true"
        envFrom:
          - secretRef:
              name: keycloak-secret
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9000
          name: management
        resources:
          requests:
            cpu: {{ .Values.keycloak.resources.requests.cpu | default "100m" }}
            memory: {{ .Values.keycloak.resources.requests.memory | default "512Mi" }}
          limits:
            memory: {{ .Values.keycloak.resources.limits.memory | default "1Gi" }}
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        volumeMounts:
          - name: keycloak-realm
            mountPath: /opt/keycloak/data/import
            readOnly: true
      volumes:
        - name: keycloak-realm
          configMap:
            name: {{ .Release.Name }}-keycloak-realm
            items:
              - key: realm.json
                path: realm.json
      initContainers: []
