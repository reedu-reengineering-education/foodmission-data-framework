apiVersion: v1
kind: Secret
metadata:
  name: foodmission-api-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: api-credentials
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "FoodMission API application secrets and configuration"
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-8"
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  NODE_ENV: "production"
  # Database connection - reference from infra layer CNPG secret
  DATABASE_URL: "postgresql://{{ .Values.global.cnpg.owner }}:{{ .Values.global.cnpg.password }}@{{ .Values.global.cnpg.clusterName }}-rw.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.global.cnpg.database }}"
  SESSION_SECRET: "{{ required "api.sessionSecret is required" .Values.api.sessionSecret }}"
  ENCRYPTION_KEY: "{{ required "api.encryptionKey is required" .Values.api.encryptionKey }}"
  KEYCLOAK_BASE_URL: "{{ .Values.api.keycloak.baseUrl }}"
  KEYCLOAK_REALM: "{{ .Values.api.keycloak.realm }}"
  KEYCLOAK_CLIENT_ID: "{{ .Values.api.keycloak.clientId }}"
  KEYCLOAK_CLIENT_SECRET: "{{ required "api.keycloak.clientSecret is required" .Values.api.keycloak.clientSecret }}"
  KEYCLOAK_REDIRECT_URI: "{{ .Values.api.keycloak.redirectUri }}"
  KEYCLOAK_SERVICE_CLIENT_ID: "{{ .Values.api.keycloak.serviceClientId }}"
  KEYCLOAK_SERVICE_CLIENT_SECRET: "{{ required "api.keycloak.serviceClientSecret is required" .Values.api.keycloak.serviceClientSecret }}"
  # Logging configuration
  LOG_LEVEL: "{{ .Values.api.logging.level | default "info" }}"
  # OpenTelemetry configuration (optional)
  {{- if .Values.api.opentelemetry.enabled }}
  OTEL_LOGS_ENABLED: "{{ .Values.api.opentelemetry.enabled }}"
  {{- if .Values.api.opentelemetry.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.api.opentelemetry.endpoint }}"
  {{- end }}
  {{- if .Values.api.opentelemetry.headers }}
  OTEL_EXPORTER_OTLP_HEADERS: '{{ .Values.api.opentelemetry.headers }}'
  {{- end }}
  {{- if .Values.api.opentelemetry.serviceName }}
  OTEL_SERVICE_NAME: "{{ .Values.api.opentelemetry.serviceName }}"
  {{- end }}
  {{- if .Values.api.opentelemetry.serviceNamespace }}
  OTEL_SERVICE_NAMESPACE: "{{ .Values.api.opentelemetry.serviceNamespace }}"
  {{- end }}
  {{- if .Values.api.opentelemetry.serviceVersion }}
  OTEL_SERVICE_VERSION: "{{ .Values.api.opentelemetry.serviceVersion }}"
  {{- end }}
  {{- end }}
