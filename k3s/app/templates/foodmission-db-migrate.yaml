{{- if .Values.global.cnpg }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-prisma-migrate
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: db-migration
    app.kubernetes.io/part-of: foodmission
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    environment: {{ .Values.global.environment }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    description: "Database migration job using Prisma"
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3  # Retry up to 3 times in case DB is still initializing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/component: db-migration
        app.kubernetes.io/part-of: foodmission
        environment: {{ .Values.global.environment }}
    spec:
      initContainers:
      # Wait for database to be ready
      - name: wait-for-db
        image: postgres:16-alpine
        command:
          - sh
          - -c
          - |
            until pg_isready -h {{ .Values.global.cnpg.clusterName }}-rw.{{ .Values.global.namespace }}.svc.cluster.local -p 5432 -U {{ .Values.global.cnpg.owner }}; do
              echo "Waiting for database to be ready..."
              sleep 5
            done
            echo "Database is ready!"
      containers:
      - name: migrate
        image: {{ .Values.api.image }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        command: ["node", "node_modules/.bin/prisma", "migrate", "deploy"]
        envFrom:
          - secretRef:
              name: foodmission-api-secret
        # All environment variables are now loaded from the secret foodmission-api-secret
      restartPolicy: Never
{{- end }}
