# Minimal Prometheus configuration for k3s
server:
  global:
    scrape_interval: 30s
    scrape_timeout: 10s
    evaluation_interval: 30s
  
  persistentVolume:
    enabled: true
    size: 8Gi
  
  retention: "15d"
  
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Enable kube-state-metrics for basic Kubernetes metrics
kubeStateMetrics:
  enabled: true

# Enable node-exporter for node-level metrics
nodeExporter:
  enabled: true

# Disable optional components
pushgateway:
  enabled: false

alertmanager:
  enabled: false
