name: Cleanup Docker Images

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not delete, only list)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cleanup:
    name: Cleanup Unused Docker Images
    runs-on: ubuntu-latest

    permissions:
      packages: write
      pull-requests: read

    steps:
      - name: Get open PRs
        id: open-prs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const prNumbers = pullRequests.map(pr => pr.number);
            console.log(`Found ${prNumbers.length} open PRs: ${prNumbers.join(', ')}`);
            
            // Create protected tag patterns for open PRs
            const protectedTags = prNumbers.map(num => `pr-${num}`);
            return protectedTags;

      - name: Delete untagged and unused images
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            const protectedPrTags = ${{ steps.open-prs.outputs.result }};
            
            // Protected tags that should never be deleted
            const alwaysProtectedTags = ['main', 'latest'];
            
            // Combine all protected patterns
            const isProtected = (tags) => {
              if (!tags || tags.length === 0) return false;
              
              return tags.some(tag => {
                // Protect main and latest
                if (alwaysProtectedTags.includes(tag)) return true;
                
                // Protect PR tags for open PRs
                if (protectedPrTags.includes(tag)) return true;
                
                // Protect semver tags (v1.0.0, 1.0.0, etc.)
                if (/^v?\d+\.\d+\.\d+/.test(tag)) return true;
                
                return false;
              });
            };
            
            const packageName = context.repo.repo;
            
            console.log('=== Docker Image Cleanup ===');
            console.log(`Package: ${packageName}`);
            console.log(`Dry run: ${dryRun}`);
            console.log(`Protected PR tags: ${protectedPrTags.join(', ') || 'none'}`);
            console.log(`Always protected: ${alwaysProtectedTags.join(', ')}`);
            console.log('');
            
            let deletedCount = 0;
            let skippedCount = 0;
            let page = 1;
            const perPage = 100;
            
            while (true) {
              // Get package versions
              const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                package_type: 'container',
                package_name: packageName,
                org: context.repo.owner,
                per_page: perPage,
                page: page
              }).catch(async () => {
                // Try user-owned package if org fails
                return await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                  package_type: 'container',
                  package_name: packageName,
                  username: context.repo.owner,
                  per_page: perPage,
                  page: page
                });
              });
              
              if (versions.length === 0) break;
              
              for (const version of versions) {
                const tags = version.metadata?.container?.tags || [];
                const versionId = version.id;
                const createdAt = version.created_at;
                
                if (isProtected(tags)) {
                  console.log(`✓ KEEP: ${versionId} [${tags.join(', ') || 'untagged'}] - protected`);
                  skippedCount++;
                  continue;
                }
                
                // Skip untagged images that are less than 30 days old (might be in use)
                if (tags.length === 0) {
                  const ageInDays = (Date.now() - new Date(createdAt).getTime()) / (1000 * 60 * 60 * 24);
                  if (ageInDays < 30) {
                    console.log(`✓ KEEP: ${versionId} [untagged] - less than 30 days old`);
                    skippedCount++;
                    continue;
                  }
                }
                
                console.log(`✗ DELETE: ${versionId} [${tags.join(', ') || 'untagged'}]`);
                
                if (!dryRun) {
                  try {
                    await github.rest.packages.deletePackageVersionForOrg({
                      package_type: 'container',
                      package_name: packageName,
                      org: context.repo.owner,
                      package_version_id: versionId
                    }).catch(async () => {
                      // Try user-owned package if org fails
                      await github.rest.packages.deletePackageVersionForUser({
                        package_type: 'container',
                        package_name: packageName,
                        username: context.repo.owner,
                        package_version_id: versionId
                      });
                    });
                    deletedCount++;
                  } catch (error) {
                    console.log(`  ⚠ Failed to delete: ${error.message}`);
                  }
                } else {
                  deletedCount++;
                }
              }
              
              if (versions.length < perPage) break;
              page++;
            }
            
            console.log('');
            console.log('=== Summary ===');
            console.log(`${dryRun ? 'Would delete' : 'Deleted'}: ${deletedCount} images`);
            console.log(`Kept: ${skippedCount} images`);
