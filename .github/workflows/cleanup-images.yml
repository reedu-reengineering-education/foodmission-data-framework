name: Cleanup Docker Images

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not delete, only list)'
        type: boolean
        default: false

jobs:
  cleanup:
    name: Cleanup Unused Docker Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pull-requests: read

    steps:
      - name: Cleanup images
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            const { owner, repo } = context.repo;
            
            // Get open PR numbers
            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const openPrTags = new Set(prs.map(pr => `pr-${pr.number}`));
            
            const isProtected = (tags) => tags?.some(tag =>
              ['main', 'latest'].includes(tag) ||
              openPrTags.has(tag) ||
              /^v?\d+\.\d+\.\d+/.test(tag)
            );
            
            const deleteVersion = async (id) => {
              if (dryRun) return true;
              try {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'container', package_name: repo, org: owner, package_version_id: id
                }).catch(() => github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container', package_name: repo, username: owner, package_version_id: id
                }));
                return true;
              } catch (e) { console.log(`  ⚠ Failed: ${e.message}`); return false; }
            };
            
            console.log(`=== Docker Image Cleanup (dry_run: ${dryRun}) ===\n`);
            let deleted = 0, kept = 0, page = 1;
            
            while (true) {
              const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                package_type: 'container', package_name: repo, org: owner, per_page: 100, page
              }).catch(() => github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                package_type: 'container', package_name: repo, username: owner, per_page: 100, page
              }));
              
              if (!versions.length) break;
              
              for (const v of versions) {
                const tags = v.metadata?.container?.tags || [];
                const age = (Date.now() - new Date(v.created_at)) / 86400000;
                
                if (isProtected(tags)) {
                  console.log(`✓ KEEP: ${v.id} [${tags.join(', ')}] - protected`);
                  kept++;
                } else if (!tags.length) {
                  console.log(`✗ DELETE: ${v.id} [untagged]`);
                  if (await deleteVersion(v.id)) deleted++;
                } else if (age >= 30) {
                  console.log(`✗ DELETE: ${v.id} [${tags.join(', ')}] - older than 30 days`);
                  if (await deleteVersion(v.id)) deleted++;
                } else {
                  console.log(`✓ KEEP: ${v.id} [${tags.join(', ')}] - ${Math.floor(age)} days old`);
                  kept++;
                }
              }
              
              if (versions.length < 100) break;
              page++;
            }
            
            console.log(`\n=== Summary: ${dryRun ? 'Would delete' : 'Deleted'} ${deleted}, Kept ${kept} ===`);
