services:
  postgres:
    image: postgres:15-alpine
    container_name: foodmission-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foodmission_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foodmission-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: ghcr.io/reedu-reengineering-education/foodmission-keycloak:main
    platform: linux/amd64
    container_name: foodmission-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password
      KC_LOG_LEVEL: DEBUG
      KC_MAIL_HOST: mailpit
      KC_MAIL_PORT: 1025
      KC_MAIL_FROM: "noreply@localhost"
      KC_MAIL_SSL: "false"
      KC_MAIL_STARTTLS: "false"
      KC_MAIL_AUTH: "false"
      WEBHOOK_URI: http://host.docker.internal:3000/api/v1/webhooks/keycloak/events
      WEBHOOK_SECRET: test-webhook-secret
    ports:
      - '127.0.0.1:8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:8080/health/ready || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  mailpit:
    image: axllent/mailpit:latest
    container_name: foodmission-mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    volumes:
      - mailpit_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
