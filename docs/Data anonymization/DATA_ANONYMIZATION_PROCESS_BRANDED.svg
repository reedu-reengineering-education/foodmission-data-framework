<svg width="780" height="1120" viewBox="0 0 780 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#024639"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="1120" fill="white"/>

  <!-- ═══════ PRIVATE DATA ═══════ -->
  <rect x="40" y="20" width="700" height="108" rx="2" fill="none" stroke="#ff964f" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="390" y="42" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="700" fill="#ff964f">PRIVATE DATA (never exposed)</text>

  <!-- DB entities -->
  <rect x="60" y="56" width="112" height="50" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="1"/>
  <text x="116" y="78" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">Users</text>
  <text x="116" y="94" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">email, gender, age</text>

  <rect x="186" y="56" width="112" height="50" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="1"/>
  <text x="242" y="78" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">Meals</text>
  <text x="242" y="94" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">name, items, score</text>

  <rect x="312" y="56" width="112" height="50" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="1"/>
  <text x="368" y="78" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">MealLogs</text>
  <text x="368" y="94" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">userId, mealType, ts</text>

  <rect x="438" y="56" width="112" height="50" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="1"/>
  <text x="494" y="78" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">Foods</text>
  <text x="494" y="94" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">kcal, protein, fat</text>

  <rect x="564" y="56" width="150" height="50" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="1"/>
  <text x="639" y="78" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">FoodCategories</text>
  <text x="639" y="94" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">NEVO classification</text>

  <!-- Arrow 0→1 -->
  <line x1="390" y1="128" x2="390" y2="162" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ STEP 1 ═══════ -->
  <rect x="60" y="166" width="660" height="96" rx="2" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="80" y="190" font-family="'Roboto Condensed', Arial, sans-serif" font-size="15" font-weight="700" fill="#024639">Step 1: Raw Data Fetch</text>
  <text x="80" y="212" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#333">SQL JOIN across MealLogs, Meals, MealItems, Foods and User demographics.</text>
  <text x="80" y="228" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#333">Filters by date range (periodStart to periodEnd).</text>
  <text x="80" y="248" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#5a7a6e" font-style="italic">Output: RawMealRow[] — one row per Meal x Food-Item</text>

  <!-- Arrow 1→2 -->
  <line x1="390" y1="262" x2="390" y2="296" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ STEP 2 ═══════ -->
  <rect x="60" y="300" width="660" height="96" rx="2" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="80" y="324" font-family="'Roboto Condensed', Arial, sans-serif" font-size="15" font-weight="700" fill="#024639">Step 2: Per-Meal Aggregation</text>
  <text x="80" y="346" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#333">Groups by mealLogId; sums calories, protein, fat, carbohydrates, CO2.</text>
  <text x="80" y="362" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#333">Determines flags: isVegetarian, isVegan, NOVA group, NutriScore, EcoScore.</text>
  <text x="80" y="382" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#5a7a6e" font-style="italic">userId is used only for counting — never stored in output.</text>

  <!-- Arrow 2→3 -->
  <line x1="390" y1="396" x2="390" y2="430" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ STEP 3 ═══════ -->
  <rect x="60" y="434" width="660" height="140" rx="2" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="80" y="458" font-family="'Roboto Condensed', Arial, sans-serif" font-size="15" font-weight="700" fill="#024639">Step 3: Statistical Aggregation</text>
  <text x="80" y="480" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#333">Groups by date, meal type, and optional demographic dimension.</text>

  <!-- Sub-boxes -->
  <rect x="80" y="494" width="190" height="46" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="0.75"/>
  <text x="175" y="514" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" font-weight="600" fill="#024639">Standard (6 tables)</text>
  <text x="175" y="530" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">Nutrition, Popularity, Patterns</text>

  <rect x="285" y="494" width="190" height="46" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="0.75"/>
  <text x="380" y="514" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" font-weight="600" fill="#024639">Single-Dim (3 tables)</text>
  <text x="380" y="530" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">+ age / gender / country</text>

  <rect x="490" y="494" width="210" height="46" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="0.75"/>
  <text x="595" y="514" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" font-weight="600" fill="#024639">Cross-Dim (3 tables)</text>
  <text x="595" y="530" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="10" fill="#5a7a6e">dim1 x dim2 (e.g. gender x country)</text>

  <text x="80" y="564" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#5a7a6e" font-style="italic">Only averages, percentiles, distributions — no PII, no individual data.</text>

  <!-- Arrow 3→4 -->
  <line x1="390" y1="574" x2="390" y2="608" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ STEP 4 ═══════ -->
  <rect x="60" y="612" width="660" height="118" rx="2" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="80" y="636" font-family="'Roboto Condensed', Arial, sans-serif" font-size="15" font-weight="700" fill="#024639">Step 4: k-Anonymity Suppression</text>

  <!-- K=5 box -->
  <rect x="80" y="650" width="300" height="58" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="0.75"/>
  <text x="230" y="672" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">Standard + Single-Dim</text>
  <text x="230" y="692" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="18" font-weight="700" fill="#ff964f">k ≥ 5</text>

  <!-- K=20 box -->
  <rect x="400" y="650" width="300" height="58" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="0.75"/>
  <text x="550" y="672" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="600" fill="#024639">Cross-Dimensional</text>
  <text x="550" y="692" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="18" font-weight="700" fill="#ff964f">k ≥ 20</text>

  <text x="80" y="722" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#5a7a6e" font-style="italic">Rows with userCount below the threshold are suppressed to prevent re-identification.</text>

  <!-- Arrow 4→5 -->
  <line x1="390" y1="730" x2="390" y2="764" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ STEP 5 ═══════ -->
  <rect x="60" y="768" width="660" height="128" rx="2" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="80" y="792" font-family="'Roboto Condensed', Arial, sans-serif" font-size="15" font-weight="700" fill="#024639">Step 5: Batch Lifecycle</text>
  <text x="278" y="792" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#5a7a6e">(Human-in-the-Loop Review)</text>

  <!-- Batch flow boxes -->
  <rect x="100" y="812" width="130" height="36" rx="1" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="165" y="835" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="700" fill="#024639">STAGING</text>

  <line x1="230" y1="830" x2="280" y2="830" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="284" y="812" width="130" height="36" rx="1" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="349" y="835" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="700" fill="#024639">APPROVED</text>

  <line x1="414" y1="830" x2="464" y2="830" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="468" y="812" width="130" height="36" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="1.5"/>
  <text x="533" y="835" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" font-weight="700" fill="#024639">PUBLISHED</text>

  <!-- Rejected branch -->
  <line x1="349" y1="848" x2="349" y2="878" stroke="#ff964f" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="349" y="890" text-anchor="middle" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#ff964f">REJECTED</text>

  <!-- Arrow 5→6 -->
  <line x1="390" y1="896" x2="390" y2="930" stroke="#024639" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ STEP 6 ═══════ -->
  <rect x="60" y="934" width="660" height="148" rx="2" fill="none" stroke="#024639" stroke-width="1"/>
  <text x="80" y="958" font-family="'Roboto Condensed', Arial, sans-serif" font-size="15" font-weight="700" fill="#024639">Step 6: Public API</text>
  <text x="233" y="958" font-family="'Roboto Condensed', Arial, sans-serif" font-size="12" fill="#5a7a6e">(unauthenticated endpoints)</text>

  <!-- Endpoint examples -->
  <rect x="80" y="974" width="620" height="80" rx="1" fill="#d8e4d6" stroke="#024639" stroke-width="0.75"/>
  <text x="100" y="994" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#024639">GET /analytics/public/nutrition</text>
  <text x="100" y="1010" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#024639">GET /analytics/public/demographic/nutrition?dimension=country</text>
  <text x="100" y="1026" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#024639">GET /analytics/public/cross-dim/nutrition?dim1=gender&amp;dim2=country</text>
  <text x="100" y="1042" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#024639">GET /analytics/public/summary</text>

  <text x="80" y="1072" font-family="'Roboto Condensed', Arial, sans-serif" font-size="11" fill="#5a7a6e" font-style="italic">Returns exclusively statistical aggregates (averages, percentiles, counts). userCount ≥ k. No PII.</text>
</svg>
