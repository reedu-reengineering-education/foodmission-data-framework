      type: http
      name: JWT
      description: Enter JWT token obtained from Keycloak authentication
      in: header
  schemas:
    ApiErrorResponseDto:
      type: object
      properties:
        statusCode:
          type: integer
          description: HTTP status code
          example: 400
        message:
          description: Error message or array of validation errors
          oneOf:
            - type: string
              example: Bad Request
            - type: array
              items:
                type: string
              example:
                - name should not be empty
                - email must be a valid email
        error:
          type: string
          description: Error type
          example: Bad Request
        timestamp:
          type: string
          description: Timestamp when the error occurred
          example: '2024-01-15T10:30:00Z'
          format: date-time
        path:
          type: string
          description: API path where the error occurred
          example: /api/v1/foods
        correlationId:
          type: string
          description: Correlation ID for request tracing
          example: abc123def456
      required:
        - statusCode
        - message
        - error
        - timestamp
        - path
    RegisterDto:
      type: object
      properties:
        username:
          type: string
          description: Desired username
        password:
          type: string
          description: Password
        email:
          type: string
          description: Email address
        firstName:
          type: string
          description: First name
        lastName:
          type: string
          description: Last name
        yearOfBirth:
          type: number
          description: Year of birth
        country:
          type: string
          description: Country
        region:
          type: string
          description: Region/state
        zip:
          type: string
          description: Postal code
      required:
        - username
        - password
        - email
        - firstName
        - lastName
    LoginDto:
      type: object
      properties:
        username:
          type: string
          description: Username or email
        password:
          type: string
          description: Password
      required:
        - username
        - password
    LogoutDto:
      type: object
      properties:
        token:
          type: string
          description: Token to revoke (refresh or access token)
        tokenTypeHint:
          type: string
          description: Optional token type hint
      required:
        - token
