  /api/v1/foods/search/openfoodfacts:
    get:
      description: >-
        Search for products in the OpenFoodFacts database by name, category, or
        brand. Supports pagination with page and pageSize parameters.
      operationId: searchOpenFoodFacts
      parameters:
        - name: query
          required: false
          in: query
          description: Search query string (name, category, or brand)
          schema:
            type: string
        - name: category
          required: false
          in: query
          description: Filter by category
          schema:
            type: string
        - name: brand
          required: false
          in: query
          description: Filter by brand
          schema:
            type: string
        - name: page
          required: false
          in: query
          description: 'Page number (default: 1, min: 1)'
          schema:
            type: number
        - name: pageSize
          required: false
          in: query
          description: >-
            Items per page (default: 10, min: 1, max: 50). Can also use limit
            parameter for backward compatibility.
          schema:
            type: number
        - name: limit
          required: false
          in: query
          description: >-
            Items per page (alternative to pageSize, for backward compatibility,
            min: 1, max: 50)
          schema:
            type: number
      responses:
        '200':
          description: Search results from OpenFoodFacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpenFoodFactsInfoDto'
                  totalCount:
                    type: number
                  page:
                    type: number
                  pageSize:
                    type: number
                  totalPages:
                    type: number
        '400':
