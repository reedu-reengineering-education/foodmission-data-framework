          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponseDto'
        '503':
          description: OpenFoodFacts service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponseDto'
      security: *ref_3
      summary: Search OpenFoodFacts database
      tags: *ref_4
